apiVersion: v1
kind: ServiceMonitor
metadata:
  name: todo-backend-monitor
  namespace: todo-app
  labels:
    app: todo-backend
    component: monitoring
spec:
  selector:
    matchLabels:
      app: todo-backend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: v1
kind: ServiceMonitor
metadata:
  name: todo-frontend-monitor
  namespace: todo-app
  labels:
    app: todo-frontend
    component: monitoring
spec:
  selector:
    matchLabels:
      app: todo-frontend
  endpoints:
  - port: http
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
---
apiVersion: v1
kind: ServiceMonitor

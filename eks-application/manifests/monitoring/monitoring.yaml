---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: todo-app-alerts
  namespace: todo-app
  labels:
    app: todo-app
    component: monitoring
spec:
  groups:
  - name: todo-app.rules
    rules:
    - alert: TodoBackendDown
      expr: up{job="todo-backend-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Todo Backend is down"
        description: "Todo Backend service has been down for more than 1 minute"
    - alert: TodoFrontendDown
      expr: up{job="todo-frontend-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Todo Frontend is down"
        description: "Todo Frontend service has been down for more than 1 minute"
    - alert: TodoDatabaseDown
      expr: up{job="todo-database-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Todo Database is down"
        description: "Todo Database service has been down for more than 1 minute"
    - alert: TodoRedisDown
      expr: up{job="todo-redis-service"} == 0
      for: 1m
      labels:
        severity: critical
      annotations:
        summary: "Todo Redis is down"
        description: "Todo Redis service has been down for more than 1 minute"
    - alert: HighMemoryUsage
      expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High memory usage detected"
        description: "Container {{ $labels.container }} is using more than 80% of its memory limit"
    - alert: HighCPUUsage
      expr: (rate(container_cpu_usage_seconds_total[5m]) / container_spec_cpu_quota * container_spec_cpu_period) > 0.8
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "High CPU usage detected"
        description: "Container {{ $labels.container }} is using more than 80% of its CPU limit"
    - alert: PodCrashLooping
      expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
      for: 1m
      labels:
        severity: warning
      annotations:
        summary: "Pod is crash looping"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is crash looping"
    - alert: PodNotReady
      expr: kube_pod_status_phase{phase!="Running"} == 1
      for: 5m
      labels:
        severity: warning
      annotations:
        summary: "Pod is not ready"
        description: "Pod {{ $labels.pod }} in namespace {{ $labels.namespace }} is not ready"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-todo-app
  namespace: todo-app
  labels:
    app: todo-app
    component: monitoring
data:
  todo-app-dashboard.json: |
    {
      "dashboard": {
        "id": null,
        "title": "Todo App Dashboard",
        "tags": ["todo-app", "ecs-to-eks-migration"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Service Status",
            "type": "stat",
            "targets": [
              {
                "expr": "up{job=~\"todo-.*-service\"}",
                "legendFormat": "{{ job }}"
              }
            ],
            "fieldConfig": {
              "defaults": {
                "color": {
                  "mode": "thresholds"
                },
                "thresholds": {
                  "steps": [
                    {
                      "color": "red",
                      "value": 0
                    },
                    {
                      "color": "green",
                      "value": 1
                    }
                  ]
                }
              }
            },
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 0
            }
          },
          {
            "id": 2,
            "title": "Memory Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "container_memory_usage_bytes{container!=\"POD\",container!=\"\"}",
                "legendFormat": "{{ container }}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 0
            }
          },
          {
            "id": 3,
            "title": "CPU Usage",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(container_cpu_usage_seconds_total{container!=\"POD\",container!=\"\"}[5m])",
                "legendFormat": "{{ container }}"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 0,
              "y": 8
            }
          },
          {
            "id": 4,
            "title": "Network I/O",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(container_network_receive_bytes_total{container!=\"POD\",container!=\"\"}[5m])",
                "legendFormat": "{{ container }} RX"
              },
              {
                "expr": "rate(container_network_transmit_bytes_total{container!=\"POD\",container!=\"\"}[5m])",
                "legendFormat": "{{ container }} TX"
              }
            ],
            "gridPos": {
              "h": 8,
              "w": 12,
              "x": 12,
              "y": 8
            }
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "30s"
      }
    }

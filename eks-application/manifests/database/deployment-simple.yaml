apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-database
  namespace: todo-app
  labels:
    app: todo-database
    version: v1
    component: database
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-database
  template:
    metadata:
      labels:
        app: todo-database
        version: v1
        component: database
    spec:
      serviceAccountName: todo-database-sa
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
          name: postgres
          protocol: TCP
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: todo-database-secrets
              key: postgres-db
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: todo-database-secrets
              key: postgres-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: todo-database-secrets
              key: postgres-password
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        livenessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - todoapp
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
            - -d
            - todoapp
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-data
        emptyDir: {}
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: todo-database-service
  namespace: todo-app
  labels:
    app: todo-database
    component: database
spec:
  type: ClusterIP
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
    name: postgres
  selector:
    app: todo-database
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: todo-database-sa
  namespace: todo-app
  labels:
    app: todo-database
    component: database
---
apiVersion: v1
kind: Secret
metadata:
  name: todo-database-secrets
  namespace: todo-app
  labels:
    app: todo-database
    component: database
type: Opaque
data:
  postgres-db: dG9kb2FwcA==
  postgres-user: cG9zdGdyZXM=
  postgres-password: Y2hhbmdlbWUxMjM=
